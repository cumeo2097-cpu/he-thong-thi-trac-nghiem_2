<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 1 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 12</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
        const quizData = [
    {q: "Câu 1: Người lao động tốt cần hội tụ yếu tố nào?", o: ["A. Tình yêu thương", "B. Cần – Kiệm", "C. Liêm – Chính", "D. Đức – Tài"], a: 3},
    {q: "Câu 2: Hoàn thiện chính sách cung ứng dịch vụ công cộng thiết yếu nhằm?", o: ["A. Phát triển đất nước", "B. Đáp ứng nguyện vọng nhân dân", "C. Hội nhập quốc tế", "D. Đảm bảo công bằng và bình đẳng"], a: 1},
    {q: "Câu 3: Đảng ra đời vĩ đại vì chấm dứt điều gì?", o: ["A. Lãnh đạo của tư sản", "B. Hội VNCM thanh niên", "C. Khủng hoảng đường lối và giai cấp lãnh đạo", "D. Lãnh đạo của phong kiến"], a: 2},
    {q: "Câu 4: Theo HCM, cách mạng giải phóng dân tộc phải đi theo con đường nào?", o: ["A. Tư sản", "B. TBCN", "C. Ruộng đất", "D. Vô sản"], a: 3},
    {q: "Câu 5: Sức mạnh bảo vệ Tổ quốc là?", o: ["A. Lực lượng vũ trang", "B. Đảng, dân và quân", "C. Nội lực và ngoại lực", "D. Đại đoàn kết dân tộc, cả hệ thống chính trị"], a: 3},
    {q: "Câu 6: Nhận định: Tiền tệ có 5 chức năng. Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 7: 18/06/1919, Nguyễn Ái Quốc gửi bản yêu sách tới hội nghị nào?", o: ["A. Tehran", "B. Pan", "C. Vécxây", "D. Yalta"], a: 2},
    {q: "Câu 8: Cổ vũ hủ tục lạc hậu là điều kiện trở thành công dân tốt. Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 1},
    {q: "Câu 9: Bí quyết thành công của Đảng là gì?", o: ["A. Thực hiện dân chủ", "B. Lắng nghe dân", "C. Tiêu diệt phản động", "D. Giữ vững bản chất giai cấp công nhân"], a: 3},
    {q: "Câu 10: Ngày 5/6/1911 đã diễn ra sự kiện gì?", o: ["A. Nguyễn Tất Thành tìm đường cứu nước", "B. VN Quang phục hội thành lập", "C. Đông Kinh nghĩa thục thành lập", "D. Kháng thuế ở Trung Kì"], a: 0},
    {q: "Câu 11: Hình tượng 'Con đỉa hai vòi' dùng để chỉ cái gì?", o: ["A. Chủ nghĩa tư bản", "B. Chủ nghĩa đế quốc", "C. Thực dân Pháp", "D. Phong kiến"], a: 0},
    {q: "Câu 12: Điền từ: 'Một dân tộc …. là một dân tộc …...'", o: ["A. yếu/dốt", "B. dốt/hèn", "C. yếu/hèn", "D. dốt/yếu"], a: 3},
    {q: "Câu 13: Phẩm chất đạo đức cơ bản của con người VN thời đại mới là?", o: ["A. Trung với nước, hiếu với dân", "B. Cần, kiệm, liêm, chính", "C. Tinh thần quốc tế", "D. Tất cả đều đúng"], a: 3},
    {q: "Câu 14: Đoàn kết các dân tộc thể hiện qua hoạt động nào?", o: ["A. Lễ hội", "B. Giáo dục", "C. Hợp tác kinh tế", "D. Tất cả phương án trên"], a: 3},
    {q: "Câu 15: Ý nào KHÔNG đúng về quyền và nghĩa vụ công dân?", o: ["A. Không cần tôn trọng quyền người khác", "B. Được Hiến pháp bảo vệ", "C. Không bị phân biệt đối xử", "D. Bình đẳng trước pháp luật"], a: 0}
];

        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
