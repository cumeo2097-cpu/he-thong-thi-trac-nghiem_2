<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 1 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 9</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
        const quizData = [
    {q: "Câu 1: Người lao động có nghĩa vụ?", o: ["A. Làm việc trong điều kiện không bảo đảm an toàn.", "B. Tuân theo mọi sự phân công, điều động của cấp trên.", "C. Chấp hành kỉ luật lao động, nội quy lao động.", "D. Không được nghỉ chế độ khi đang nhiều việc."], a: 2},
    {q: "Câu 2: Tiêu chí tu dưỡng rèn luyện để sinh viên trở thành công dân tốt?", o: ["A. Có ý thức công dân", "B. Thực hiện tốt quyền và nghĩa vụ", "C. Cả 3 đáp án trên", "D. Tu dưỡng, rèn luyện đạo đức, lối sống"], a: 2},
    {q: "Câu 3: Công dân có quyền tham gia quản lý nhà nước và xã hội?", o: ["A. Sai", "B. Đúng"], a: 1},
    {q: "Câu 4: Công dân bày tỏ quan điểm về chính trị, kinh tế, xã hội qua quyền nào?", o: ["A. Quyền khiếu nại.", "B. Quyền tự do ngôn luận.", "C. Quyền bầu cử, ứng cử.", "D. Quyền tố cáo."], a: 1},
    {q: "Câu 5: Những lợi ích cơ bản mà công dân được hưởng, được Nhà nước bảo vệ theo Hiến pháp là?", o: ["A. Nghĩa vụ công dân.", "B. Các quyền con người", "C. Nghĩa vụ con người", "D. Quyền cơ bản của công dân."], a: 3},
    {q: "Câu 6: Hoạt động có mục đích tạo ra của cải vật chất và giá trị tinh thần là?", o: ["A. Hướng nghiệp.", "B. Trải nghiệm.", "C. Lao động", "D. Dịch vụ."], a: 2},
    {q: "Câu 7: Đặc điểm của người lao động tốt?", o: ["A. Luôn quan tâm đến lợi ích bản thân", "B. Phải có bằng cấp cao", "C. Cố mọi cách để tạo năng suất cao", "D. Có tình yêu yêu nghề, giữ gìn đạo đức nghề nghiệp"], a: 3},
    {q: "Câu 8: Người nào được hưởng quyền và thực hiện nghĩa vụ công dân theo pháp luật VN?", o: ["A. Người có quốc tịch Việt Nam.", "B. Người đang sống tại Việt Nam.", "C. Người đã thôi quốc tịch VN.", "D. Người nước ngoài tại VN."], a: 0},
    {q: "Câu 9: Công dân đủ 21 tuổi trở lên có quyền ứng cử vào Quốc hội, HĐND?", o: ["A. Sai", "B. Đúng"], a: 1},
    {q: "Câu 10: Ý nào KHÔNG đúng khi nói về nghĩa vụ lao động?", o: ["A. Lao động là nghĩa vụ thiêng liêng.", "B. Lao động là nghĩa vụ đối với gia đình.", "C. Lao động chỉ để kiếm tiền thoả mãn bản thân.", "D. Lao động để góp phần phát triển đất nước."], a: 2},
    {q: "Câu 11: Người lao động tốt?", o: ["A. Tạo hiệu suất cao", "B. Lao động trí óc", "C. Lao động chân tay", "D. Công dân tốt có khả năng lao động tốt"], a: 3},
    {q: "Câu 12: Nghĩa vụ của người công nhân là?", o: ["A. Đi làm đúng giờ.", "B. Không đánh nhau cãi nhau.", "C. Cả A, B, C.", "D. Chấp hành kỉ cương nề nếp công ty."], a: 2},
    {q: "Câu 13: Độ tuổi thấp nhất của người lao động là?", o: ["A. 18 tuổi.", "B. Từ đủ 18 tuổi.", "C. 15 tuổi.", "D. Từ đủ 15 tuổi."], a: 3},
    {q: "Câu 14: Công dân nước CHXHCN Việt Nam là người có quốc tịch Việt Nam?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 15: Công dân bình đẳng về quyền và nghĩa vụ như thế nào?", o: ["A. Bình đẳng theo quy định pháp luật.", "B. Nghĩa vụ như nhau.", "C. Quyền như nhau.", "D. Quyền và nghĩa vụ giống nhau."], a: 0}
]; 
        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
