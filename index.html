<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Truy Cập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { color: #0056b3; margin-bottom: 20px; }
        input { padding: 12px; width: 100%; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        button { background: #0056b3; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #msg { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
    <script>
        // TỰ ĐỘNG VÀO MENU NẾU ĐÃ KÍCH HOẠT TRƯỚC ĐÓ
        if (localStorage.getItem("quiz_access_token") === "active") {
            window.location.href = "menu.html";
        }
    </script>

    <div class="box">
        <h2>KÍCH HOẠT</h2>
        <p style="font-size: 13px; color: #666;">Mã chỉ có hiệu lực cho 01 lần nhập</p>
        <input type="text" id="codeField" placeholder="Nhập mã truy cập...">
        <button id="submitBtn" onclick="handleCheck()">VÀO THI NGAY</button>
        <p id="msg"></p>
    </div>

    <script>
        // --- QUAN TRỌNG: DÁN LINK WEB APP MỚI NHẤT CỦA BẠN VÀO ĐÂY ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxwewuQm_5Yd7nASEVc7a04TueXtN26Bl-jB5_Ezlbq6-0kpZe8zLE_j6XXljaIaaDo/exec";

        async function handleCheck() {
            const input = document.getElementById('codeField');
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('msg');
            const code = input.value.trim();
            
            if(!code) {
                msg.style.color = "red";
                msg.innerText = "⚠️ Bạn chưa nhập mã!";
                return;
            }
            
            // Khóa nút để tránh bấm nhiều lần
            btn.disabled = true;
            btn.innerText = "ĐANG XÁC THỰC...";
            msg.style.color = "blue";
            msg.innerText = "Vui lòng chờ giây lát...";

            try {
                // Thêm tham số t=Date.now() để ép trình duyệt gọi dữ liệu mới nhất, không lấy cache cũ
                const finalUrl = API_URL + "?code=" + encodeURIComponent(code) + "&t=" + Date.now();
                
                const response = await fetch(finalUrl);
                const data = await response.json();

                if(data.status === "success") {
                    localStorage.setItem("quiz_access_token", "active");
                    window.location.href = "menu.html";
                } else {
                    msg.style.color = "red";
                    msg.innerText = "❌ " + data.message;
                    btn.disabled = false;
                    btn.innerText = "VÀO THI NGAY";
                }
            } catch (e) {
                msg.style.color = "red";
                msg.innerText = "🚫 Lỗi kết nối server!";
                btn.disabled = false;
                btn.innerText = "THỬ LẠI";
            }
        }
    </script>
</body>
</html>
