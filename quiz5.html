<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 5 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 5</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
        const quizData = [
            {q: "Câu 1: Đặc trưng CNXH: “Có nền văn hóa…, đậm đà bản sắc dân tộc”.", o: ["A. Tiến bộ", "B. Tiên tiến", "C. Cổ truyền", "D. Phát triển"], a: 1},
            {q: "Câu 2: Đảng và nhà nước ta coi chính sách dân số là?", o: ["A. Quốc sách", "B. Then chốt", "C. Quan trọng", "D. Thiết yếu"], a: 0},
            {q: "Câu 3: Đặc điểm lớn nhất của nước ta thời kỳ quá độ là từ nước nông nghiệp lạc hậu tiến thẳng lên CNXH đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 4: Sở hữu toàn dân về tư liệu sản xuất còn được gọi sở hữu nhà nước?", o: ["A. Sai", "B. Đúng"], a: 1},
            {q: "Câu 5: Xây dựng văn hóa là sự nghiệp của Toàn dân do Đảng lãnh đạo?", o: ["A. Sai", "B. Đúng"], a: 1},
            {q: "Câu 6: Thành phần kinh tế Nhà nước giữ vai trò chủ đạo ở nước ta?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 7: Văn hóa VN có tính chất tổng hợp và đa dạng đúng hay sai?", o: ["A. Sai", "B. Đúng"], a: 1},
            {q: "Câu 8: Đường lối văn hóa hiện nay: Đa dạng hóa bản sắc, phát triển giá trị truyền thống đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 1},
            {q: "Câu 9: Sở hữu tư nhân ở VN biểu hiện qua hình thức cá thể, tiểu chủ, tư bản tư nhân, hộ gia đình đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 10: Kết hợp mục tiêu kinh tế với xã hội trên phạm vi cả nước đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 11: Nguy cơ tụt hậu, chệch hướng, tham nhũng, diễn biến hòa bình được nhận định ở:", o: ["A. Đại hội VIII", "B. Đại hội IX", "C. Đại hội VII", "D. Đại hội X"], a: 2},
            {q: "Câu 12: Kinh tế thị trường định hướng XHCN giúp phát triển LLSX, tăng năng suất đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 13: Theo HCM, văn hóa có 6 chức năng cơ bản đúng hay sai?", o: ["A. Sai", "B. Đúng"], a: 0},
            {q: "Câu 14: Vấn đề “Tam nông” là Nông nghiệp, nông thôn, nông dân đúng hay sai?", o: ["A. Sai", "B. Đúng"], a: 0},
            {q: "Câu 15: Chủ trương y tế công bằng hướng đến mọi người dân được chăm sóc sức khỏe đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0}
        ];

        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
