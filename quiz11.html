<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 11 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 11</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
        const quizData = [
            {q: "Câu 1: Mục tiêu đối ngoại của nước ta là?", o: ["A. Phát triển mọi lĩnh vực", "B. Nâng cao vị thế quốc tế", "C. Thúc đẩy kinh tế", "D. Tất cả đều đúng"], a: 3},
            {q: "Câu 2: Hành vi nào KHÔNG thể hiện trách nhiệm xây dựng Nhà nước pháp quyền?", o: ["A. Tuyên truyền pháp luật", "B. Không tố giác tội phạm", "C. Tham gia dân quân tự vệ", "D. Không vi phạm pháp luật"], a: 1},
            {q: "Câu 3: Phép biện chứng duy vật bao gồm?", o: ["A. 2 nguyên lý, 2 quy luật", "B. 3 nguyên lý, 2 quy luật", "C. 2 nguyên lý, 3 quy luật", "D. 3 nguyên lý, 3 quy luật"], a: 2},
            {q: "Câu 4: Thách thức trong mở rộng hợp tác quốc tế của nước ta?", o: ["A. Phân hoá giàu nghèo, dịch bệnh", "B. Sức ép cạnh tranh", "C. Biến động thị trường quốc tế", "D. Tất cả đều đúng"], a: 3},
            {q: "Câu 5: Việt Nam bình thường hoá quan hệ với Mỹ khi nào?", o: ["A. 7/2001", "B. 7/2000", "C. 7/1994", "D. 7/1995"], a: 3},
            {q: "Câu 6: Hội nhập quốc tế là sự nghiệp của?", o: ["A. Toàn dân và cả hệ thống chính trị", "B. Bộ Ngoại giao", "C. Đảng và Nhà nước", "D. Việt kiều và du học sinh"], a: 0},
            {q: "Câu 7: Theo HCM, sự kiện nào mở ra con đường giải phóng cho loài người?", o: ["A. Cách mạng Tháng Tám", "B. Cách mạng tư sản Pháp", "C. Cách mạng Tân Hợi", "D. Cách mạng Tháng Mười"], a: 3},
            {q: "Câu 8: Cái được coi là tất yếu thực chất được cấu thành bởi những cái gì?", o: ["A. Tất yếu/ ngẫu nhiên, tất yếu/ ngẫu nhiên", "B. Tất yếu/ ngẫu nhiên, ngẫu nhiên/ tất yếu", "C. Ngẫu nhiên/ tất yếu, tất yếu/ ngẫu nhiên", "D. Ngẫu nhiên/ tất yếu, ngẫu nhiên/ tất yếu"], a: 0},
            {q: "Câu 9: Điền từ: 'Toàn bộ những sáng tạo và phát minh đó (ngôn ngữ, đạo đức, khoa học...) là ……………….'", o: ["A. Văn minh", "B. Văn vật", "C. Văn hiến", "D. Văn hoá"], a: 3},
            {q: "Câu 10: Để tranh thủ giúp đỡ của các nước XHCN, HCM coi trọng nhân tố nào?", o: ["A. Tự lực cánh sinh là chính", "B. Nguồn lực ngoại sinh", "C. Đường lối độc lập tự chủ", "D. Tất cả nguồn lực"], a: 0},
            {q: "Câu 11: Pháp xâm lược VN làm nảy sinh 2 mâu thuẫn: Dân tộc - Thực dân và Nhân dân - Địa chủ. Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 12: Lực lượng cách mạng trong Cương lĩnh đầu tiên gồm?", o: ["A. Công, nông, tiểu địa chủ", "B. Công, nông, tư sản", "C. Công, nông, tiểu tư sản, trí thức", "D. Công, nông, tư sản dân tộc"], a: 2},
            {q: "Câu 13: Điều kiện quyết định nhất cho sự xuất hiện hình thái kinh tế - xã hội cộng sản chủ nghĩa?", o: ["A. Giai cấp công nhân giành chính quyền", "B. LLSX phát triển mạnh mẽ dưới CNTB", "C. Mâu thuẫn giai cấp gay gắt", "D. Xây dựng được Đảng Cộng sản"], a: 1},
            {q: "Câu 14: Nhà nước pháp quyền XHCN VN thể hiện qua nguyên tắc nào?", o: ["A. Của dân, do dân, vì dân", "B. Quản lý bằng pháp luật", "C. Do Đảng lãnh đạo", "D. Cả A, B, C"], a: 3},
            {q: "Câu 15: Chủ nghĩa Mác-Lênin là gì?", o: ["A. Thế giới quan khoa học", "B. Học thuyết của Lênin", "C. Hệ thống quan điểm của Mác, Ăngghen, Lênin", "D. Học thuyết giải phóng vô sản"], a: 2}
        ];

        // HÀM HIỂN THỊ CÂU HỎI
        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        // HÀM CHẤM ĐIỂM
        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }

        // Gọi hàm để hiện câu hỏi ngay khi tải trang
        render();
    </script>
</body>
</html>
