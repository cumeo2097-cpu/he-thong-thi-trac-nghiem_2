<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 1 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 11</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
        const quizData = [
    {q: "Câu 1: Không tố giác tội phạm là hành vi vi phạm trách nhiệm công dân đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 2: Phép biện chứng duy vật có 2 nguyên lý và 3 quy luật đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 3: Hợp tác quốc tế đối mặt với thách thức cạnh tranh và phân hóa giàu nghèo đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 4: Việt Nam bình thường hóa quan hệ với Mỹ vào tháng 7/1995 đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 5: Hội nhập là sự nghiệp của toàn dân và hệ thống chính trị đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 6: Cách mạng Tháng Mười mở ra con đường giải phóng dân tộc đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 7: Mọi cái tất yếu đều do những cái ngẫu nhiên cấu thành đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 8: Toàn bộ sáng tạo về ngôn ngữ, đạo đức, nghệ thuật... gọi là Văn hóa đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 9: Tranh thủ giúp đỡ quốc tế phải dựa trên tinh thần tự lực cánh sinh đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 10: Cương lĩnh đầu tiên xác định lực lượng là Công, Nông, Tiểu tư sản, Trí thức đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 11: Hình thái XHCN xuất hiện do sự phát triển LLSX mạnh mẽ dưới thời tư bản đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 12: Nhà nước pháp quyền do Đảng Cộng sản lãnh đạo quản lý bằng pháp luật đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 13: Chủ nghĩa Mác-Lênin là hệ thống quan điểm của Mác, Ăngghen và Lênin đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 14: Người lao động tốt cần có cả Đức và Tài đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 15: Chính sách công cộng thiết yếu nhằm đáp ứng nguyện vọng của nhân dân đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0}
];
        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
