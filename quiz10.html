<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 1 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 10</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
       const quizData = [
    {q: "Câu 1: Câu 'Đưa hổ cửa trước, rước beo cửa sau' là nói về Phan Bội Châu đúng hay sai?", o: ["A. Đúng (Nói về Phan Bội Châu)", "B. Sai (Nói về người khác)"], a: 0},
    {q: "Câu 2: Nhà nước ta mang tính dân tộc qua việc đại đoàn kết và chăm lo cho các dân tộc đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 3: Mục tiêu quá độ là xây dựng nền tảng kinh tế CNXH phồn vinh, hạnh phúc đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 4: Giai cấp tư sản thường dao động, dễ cải lương vì sợ cách mạng đánh đổ đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 5: Nguyễn Phú Trọng khẳng định kinh tế thị trường định hướng XHCN khác với kiểu TBCN đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 6: Xây dựng nền văn hóa Việt Nam tiên tiến, đậm đà bản sắc dân tộc đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 7: Muốn xây dựng CNXH, trước hết cần có con người XHCN đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 8: Ưu điểm chủ nghĩa Tam dân là phù hợp thực tế nước ta đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 9: Bảo vệ Tổ quốc cần nâng cao trách nhiệm và tinh thần cảnh giác đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 10: Con người XHCN yêu nước chân chính và có tinh thần quốc tế trong sáng đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 11: Vấn đề cơ bản của triết học là mối quan hệ giữa tư duy và tồn tại đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 12: Cải thiện chất lượng giống nòi là mục tiêu nâng cao sức khỏe con người đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 13: Toàn cầu hóa là sự hợp tác đa phương giữa các quốc gia đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 14: Quyền dân tộc tự quyết là quyền làm chủ vận mệnh dân tộc đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 15: Đối ngoại nhằm nâng cao vị thế quốc tế và phát triển kinh tế đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0}
];

        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
