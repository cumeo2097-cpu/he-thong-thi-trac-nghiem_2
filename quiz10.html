<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 1 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 10</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
       const quizData = [
    {q: "Câu 1: Nhận định 'Đưa hổ cửa trước, rước beo cửa sau' là nói về Phan Chu Trinh đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 1},
    {q: "Câu 2: Nội dung nào KHÔNG thể hiện tính dân tộc của nhà nước ta?", o: ["A. Đại đoàn kết dân tộc", "B. Nhà nước của dân, do dân, vì dân", "C. Kế thừa truyền thống tốt đẹp", "D. Chăm lo lợi ích mọi mặt các dân tộc"], a: 1},
    {q: "Câu 3: 'Đưa hổ cửa trước, rước beo cửa sau' là câu Nguyễn Ái Quốc nói về ai?", o: ["A. Ngô Đình Diệm", "B. Vua Bảo Đại", "C. Phan Bội Châu", "D. Võ Nguyên Giáp"], a: 2},
    {q: "Câu 4: Mục tiêu quá độ là xây dựng cơ bản nền tảng kinh tế CNXH... Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 5: Giai cấp nào thường dao động, dễ cải lương, thoả hiệp khi mâu thuẫn với Pháp?", o: ["A. Giai cấp tư sản", "B. Nông dân", "C. Công nhân", "D. Tiểu tư sản"], a: 0},
    {q: "Câu 6: Ai khẳng định: 'Kinh tế thị trường định hướng XHCN không phải là kinh tế bao cấp, quan liêu...'?", o: ["A. Nguyễn Phú Trọng", "B. Trương Tấn Sang", "C. Trần Đức Lương", "D. Hồ Chí Minh"], a: 0},
    {q: "Câu 7: Điền từ: 'Về xây dựng và phát triển nền văn hoá …………. tiên tiến đậm đà bản sắc dân tộc'.", o: ["A. chúng ta", "B. Việt Nam", "C. nước ta", "D. kháng chiến"], a: 1},
    {q: "Câu 8: Theo Hồ Chí Minh, muốn xây dựng CNXH trước hết cần có cái gì?", o: ["A. Con người toàn diện", "B. Con người xã hội chủ nghĩa", "C. Kinh tế phát triển", "D. Khoa học – kỹ thuật"], a: 1},
    {q: "Câu 9: Ưu điểm lớn nhất của chủ nghĩa Tam dân đối với nước ta theo HCM là:", o: ["A. Chống phong kiến", "B. Phù hợp thực tế nước ta", "C. Độc lập, tự do", "D. Tự do, dân chủ"], a: 1},
    {q: "Câu 10: Trong nhiệm vụ bảo vệ Tổ quốc luôn phải?", o: ["A. Xác định kẻ thù", "B. Chia rẽ kẻ thù", "C. Sẵn sàng chiến đấu", "D. Nâng cao trách nhiệm và cảnh giác"], a: 3},
    {q: "Câu 11: Con người XHCN có tinh thần…; lối sống tình nghĩa, cộng đồng cao.", o: ["A. Yêu nước chân chính và quốc tế trong sáng", "B. Quốc tế XHCN", "C. Yêu nước nồng nàn", "D. Yêu nước và quốc tế vô sản"], a: 0},
    {q: "Câu 12: Theo Ph. Ăngghen, vấn đề cơ bản lớn của triết học là về:", o: ["A. Vật chất", "B. Ý thức", "C. Quy luật chung", "D. Mối quan hệ giữa tư duy và tồn tại"], a: 3},
    {q: "Câu 13: Xây dựng chiến lược quốc gia nâng cao sức khoẻ là cải thiện giống nòi? Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 14: Toàn cầu hoá nghĩa là?", o: ["A. Hợp tác song phương", "B. Hợp tác đa phương giữa các quốc gia", "C. Hợp tác nước đang phát triển", "D. Hợp tác nước phát triển"], a: 1},
    {q: "Câu 15: Quyền dân tộc tự quyết là quyền ……. đối với vận mệnh dân tộc mình.", o: ["A. Tự lực", "B. Tự do", "C. Làm chủ", "D. Tự chủ"], a: 2}
];

        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 15 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
