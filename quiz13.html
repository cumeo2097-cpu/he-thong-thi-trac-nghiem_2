<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 1 - Ôn Tập</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 25px 0 10px 0; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; transition: 0.2s; }
        label:hover { background: #e2e6ea; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin-top: 20px; color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">ÔN TẬP QUIZ 13</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI & XEM ĐÁP ÁN</button>
        <div id="result"></div>
        <a href="index.html" class="back-link">← Quay lại Menu</a>
    </div>

    <script>
       const quizData = [
    {q: "Câu 1: Hành vi nào là biểu hiện của quyền tự do ngôn luận?", o: ["A. Muốn viết gì cũng được", "B. Bày tỏ quan điểm mọi lúc", "C. Bày tỏ quan điểm xây dựng chương trình", "D. Muốn nói gì cũng được"], a: 2},
    {q: "Câu 2: Thách thức khi mở rộng hợp tác quốc tế?", o: ["A. Dịch bệnh, tội phạm", "B. Sức ép cạnh tranh", "C. Biến động thị trường", "D. Tất cả đều đúng"], a: 3},
    {q: "Câu 3: Đường lối đoàn kết dân tộc hiện nay thể hiện như thế nào?", o: ["A. Tăng hoạt động kinh tế", "B. Thể chế hoá bằng pháp luật", "C. Mở rộng quan hệ quốc tế", "D. Thể chế hóa bằng các chính sách, pháp luật"], a: 3},
    {q: "Câu 4: Tiêu chí tu dưỡng rèn luyện để sinh viên thành công dân tốt?", o: ["A. Thực hiện quyền và nghĩa vụ", "B. Tu dưỡng đạo đức", "C. Có ý thức công dân", "D. Cả 3 đáp án trên"], a: 3},
    {q: "Câu 5: Con người khác loài vật ở chỗ nào?", o: ["A. Sản xuất/ Ăngghen", "B. Lao động/ Mác", "C. Tư duy/ Lênin", "D. Sáng tạo/ Ăngghen"], a: 0},
    {q: "Câu 6: Điều gì thể hiện rõ nhất sức mạnh đoàn kết hiện nay?", o: ["A. Phát triển kinh tế", "B. Tham gia các hoạt động xã hội", "C. Sự lãnh đạo của Đảng", "D. Đoàn kết phòng chống thiên tai, dịch bệnh"], a: 3},
    {q: "Câu 7: Chức năng giáo dục văn hoá thể hiện qua tư tưởng, hành động? Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
    {q: "Câu 8: Nhiệm vụ trọng tâm của đổi mới hệ thống chính trị là?", o: ["A. Ưu tiên", "B. Trước mắt", "C. Quan trọng", "D. Hoàn thiện nhà nước pháp quyền"], a: 3},
    {q: "Câu 9: Tiền tệ có mấy chức năng?", o: ["A. 5", "B. 4", "C. 3", "D. 2"], a: 0},
    {q: "Câu 10: Bản chất nhà nước ta thể hiện qua giai cấp nào?", o: ["A. Nông dân", "B. Công nhân", "C. Bị trị", "D. Thống trị"], a: 1},
    {q: "Câu 11: Sức mạnh đoàn kết chống COVID-19 phát huy nhờ đâu?", o: ["A. Huy động hệ thống chính trị", "B. Đồng thuận của dân", "C. Phòng chống quy mô lớn", "D. Tất cả các phương án trên"], a: 3},
    {q: "Câu 12: Điền từ: 'Tăng cường quốc phòng... là nhiệm vụ trọng yếu của ……. '", o: ["A. Hệ thống chính trị", "B. Mọi tầng lớp", "C. Đảng, nhà nước và toàn dân", "D. Nhà nước và toàn dân"], a: 2}
];
        function render() {
            let html = '';
            quizData.forEach((q, i) => {
                html += `<div><div class="q-title">${q.q}</div>`;
                q.o.forEach((opt, j) => {
                    html += `<label id="l-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
                });
                html += `</div>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function chamDiem() {
            let score = 0;
            quizData.forEach((q, i) => {
                let options = document.getElementsByName(`q${i}`);
                let correctIdx = q.a;
                q.o.forEach((_, j) => document.getElementById(`l-${i}-${j}`).className = '');
                document.getElementById(`l-${i}-${correctIdx}`).classList.add('correct');
                let checked = Array.from(options).find(r => r.checked);
                if (checked) {
                    let userIdx = parseInt(checked.value);
                    if (userIdx === correctIdx) score++;
                    else document.getElementById(`l-${i}-${userIdx}`).classList.add('wrong');
                }
            });
            document.getElementById('result').innerText = `KẾT QUẢ: ${score} / 12 CÂU ĐÚNG`;
            window.scrollTo(0, 0);
        }
        render();
    </script>
</body>
</html>
